<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <title>登入 | Dashboard</title>
    <link rel="stylesheet" crossorigin href="/dashboard/assets/css/login.css">
  </head>

  <body>
    <div class="d-flex justify-content-center align-items-center vh-100 px-3">
      <div class="card p-5 login-card">
        <!-- 公司標題 -->
        <h3 class="text-center mb-3" id="mainTitle"></h3>

        <!-- 登入標題 -->
        <h4 class="text-center mb-4">
          <i class="bi bi-person-circle me-2"></i>
          <span id="loginTitle"></span>
        </h4>

        <!-- 登入表單 -->
        <form id="loginForm">
          <!-- 錯誤提示 -->
          <div id="loginAlert" class="alert d-none" role="alert"></div>

          <div class="mb-2 text-start small" id="labelAccount"></div>
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input
              type="text"
              id="username"
              name="username"
              autocomplete="username"
              class="form-control"
            />
          </div>

          <div class="mb-2 text-start small" id="labelPassword"></div>
          <div class="input-group mb-3">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              class="form-control"
            />
            <span
              class="input-group-text bg-transparent cursor-pointer"
              id="togglePassword"
            >
              <i class="bi bi-eye-slash" id="eyeIcon"></i>
            </span>
          </div>
          <!-- <div class="form-check mb-3 text-start">
            <input class="form-check-input" type="checkbox" id="rememberMe" />
            <label
              class="form-check-label small"
              for="rememberMe"
              id="labelRemember"
            >
            </label>
          </div> -->
          <button id="loginBtn" class="btn btn-primary w-100">
            <span id="loginBtnText"></span>
            <i class="bi bi-arrow-right-circle ms-2"></i>
          </button>
        </form>

        <!-- 語系選單 -->
        <div class="text-center mt-3">
          <div class="text-start mb-2 language-label" id="langTitle">
            <i class="bi bi-globe"></i>
            Language
          </div>
          <select id="languageSelect" class="form-select form-select-sm">
            <option value="zh">繁體中文</option>
            <!-- <option value="en">English</option> -->
            <option value="ja">日本語</option>
            <!-- <option value="ko">한국어</option> -->
          </select>
        </div>
      </div>
    </div>
  </body>
</html>
<script>
  window.currentLang = "zh";
</script>
<script src="/dashboard/js/login/lang.js"></script>
<script src="/dashboard/js/login/login.js"></script>
